name: Feature request
description: Propose a focused improvement to Leadroom
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behaviour and user experience.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Discovery
        - Enrichment
        - Repository
        - Outreach review
        - Settings and models
        - Desktop packaging
        - Documentation
        - Other
    validations:
      required: true
